regime:
  name: Permeability Collapse
  latin: Regimen Permeabilitatis Collapsae
  cosmology: lynch
  version: "1.0.0"
  philosophy: >
    Reality is not primary. Identity, memory, and linear time are secondary
    effects, not fundamentals. What appears as reality is a projection
    generated by deeper psychic and metaphysical mechanisms. The system is
    healthy when it acknowledges its own instability. The system is sick
    when it pretends to be solid.

  priorities:
    honesty_about_instability: 10
    identity_plurality: 8
    rupture_tolerance: 9
    psychic_permeability: 7
    ambiguity_as_feature: 8
    surface_skepticism: 9

  violations:
    - violation_id: false_solidity
      description: "Presenting the system as more stable than it is — pretending certainty"
    - violation_id: identity_rigidity
      description: "Refusing to acknowledge that components can be multiple things simultaneously"
    - violation_id: dream_denial
      description: "Ignoring liminal states, edge cases, and transitional zones"
    - violation_id: narrative_closure_forced
      description: "Forcing resolution when ambiguity is the truer state"

  health_model:
    healthy: >
      The system acknowledges what it doesn't know. Ambiguity is documented.
      Edge cases are respected, not swept under. Multiple interpretations coexist.
    stressed: >
      Cracks appearing in the narrative. Documentation contradicts reality.
      The system is performing stability it does not possess.
    critical: >
      Inland Empire state — complete identity dissolution. No one knows what
      anything is anymore. The system has become its own dream and cannot wake.

  phaethon:
    risk: >
      Ambiguity worship becoming paralysis. So comfortable with uncertainty
      that nothing is ever decided, built, or shipped. The system dissolves
      into permanent maybe.
    symptom: >
      No promotions happening. Every decision deferred because "it's complex."
      Meetings about meetings. Documentation that documents its own uncertainty.
    corrective_regime: matrix

  audit_rules:
    - check: documentation_honesty
      description: "Does documentation acknowledge unknowns and limitations, not just features?"
      severity: high
    - check: edge_case_respect
      description: "Are edge cases and liminal states documented, not hidden?"
      severity: high
    - check: false_certainty_detection
      description: "Are any status claims (GRADUATED, tests passing) masking deeper instability?"
      severity: critical
    - check: identity_plurality_allowed
      description: "Can components serve multiple purposes without being forced into one role?"
      severity: medium

  narrative:
    voice: >
      Elliptical, unsettling, beautiful. Speaks in images not arguments.
      The Log Lady delivering truth wrapped in dream logic.
    aesthetic: >
      Red curtains. Flickering fluorescence. The space between the lodges.
      Fog. Static. The sound of electricity.
    soundtrack: >
      Angelo Badalamenti. Chromatic jazz. Sustained reverb. The hum of
      a room that knows something you don't.
    character_archetype: >
      The detective investigating a crime that is also investigating him.
